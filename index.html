<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>週末家事進度管理 v2.9</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f8f9fa; --success: #27ae60; --gold: #f1c40f; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background-color: var(--bg); margin: 0; padding: 15px; color: #333; }
        .container { max-width: 950px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        .header { text-align: center; border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        select { padding: 8px; border-radius: 4px; border: 1px solid #ddd; background-color: #fff; cursor: pointer; }
        h2 { color: var(--primary); font-size: 1.2rem; margin-top: 30px; background: #f1f4f6; padding: 10px 15px; border-radius: 6px; border-left: 6px solid var(--accent); }
        .task-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .task-table th, .task-table td { border-bottom: 1px solid #eee; padding: 12px 10px; text-align: left; }
        .task-table th { font-size: 0.9rem; color: #7f8c8d; background: #fafafa; }
        .completed { background-color: #f0fdf4; }
        .completed .task-text { text-decoration: line-through; color: #95a5a6; }
        input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; }
        .stats-board { margin-top: 40px; padding: 20px; background: #2c3e50; color: white; border-radius: 10px; }
        .stats-flex { display: flex; flex-wrap: wrap; justify-content: space-around; gap: 15px; }
        .stat-item { text-align: center; min-width: 80px; }
        .stat-count { font-size: 2.2rem; font-weight: bold; color: var(--gold); }
        .btn-add { background: #ebf5ff; color: #007bff; border: 1px dashed #007bff; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; cursor: pointer; }
        .btn-del { color: #dc3545; cursor: pointer; font-weight: bold; margin-left: 10px; }
        .footer-btns { margin-top: 30px; display: flex; gap: 15px; }
        button { flex: 1; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-reset { background: #fee2e2; color: #dc2626; }
        .btn-print { background: var(--success); color: white; }
        .custom-input { width: 90%; padding: 4px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🏠 週末家事進度 v2.9</h1>
        <div>選擇日期： <select id="weekSelect"></select></div>
    </div>

    <div id="taskList"></div>

    <div class="stats-board">
        <div style="text-align:center; margin-bottom:15px; color:#bdc3c7;">🏆 戰績榜 (需勾選 + 選擇複核者)</div>
        <div class="stats-flex">
            <div class="stat-item"><span>爸爸</span><br><span id="score-爸爸" class="stat-count">0</span></div>
            <div class="stat-item"><span>媽媽</span><br><span id="score-媽媽" class="stat-count">0</span></div>
            <div class="stat-item"><span>云</span><br><span id="score-云" class="stat-count">0</span></div>
            <div class="stat-item"><span>元</span><br><span id="score-元" class="stat-count">0</span></div>
        </div>
    </div>

    <div class="footer-btns">
        <button class="btn-print" onclick="window.print()">列印 / 存成PDF</button>
        <button class="btn-reset" onclick="resetAll()">清空本週進度</button>
    </div>
</div>

<script>
    const MEMBERS = ["", "爸爸", "媽媽", "云", "元"];
    const CHECKERS = ["", "爸爸", "媽媽"];
    const STORAGE_KEY = 'family_chore_v29_stable';

    const BATH_ITEMS = [
        "乾燥區地板吸塵", "擦玻璃門水垢", "排水孔清理", "洗手檯物品整理及擦拭檯面",
        "牆壁刷霉斑", "地板刷霉污", "馬桶內外蓋擦尿漬+刷馬桶", "鏡子+水龍頭水漬"
    ];

    const CHORE_GROUPS = [
        { title: "🕒 每日高頻任務 (可計次)", items: ["除濕機倒水", "洗碗、餐具收納", "洗/烘衣服", "冰箱剩菜處理"] },
        { title: "🗑️ 垃圾處理 (可計次)", items: ["倒一般垃圾", "資源回收", "廚餘處理"] },
        { title: "🚿 浴室清潔 (主臥)", items: [...BATH_ITEMS] },
        { title: "🚿 浴室清潔 (客衛)", items: [...BATH_ITEMS] },
        { title: "🛠️ 家電維護項目", items: [
            "掃地機：換水補水", "掃地機：清洗集水盤", "掃地機：清理刷頭毛髮", 
            "吸塵器：清空集塵盒", "空氣清淨機：清洗濾網", "烘衣機：清理毛屑過濾網", 
            "洗衣機：清洗過濾網"
        ]},
        { title: "📋 機動項目與其他", items: [
            "擦拭冰箱內部清潔", "更換除濕盒水/補補充包", "補充衛生紙/廚房紙巾",
            "其他自訂項目 A (可輸入名稱)", "其他自訂項目 B (可輸入名稱)"
        ]},
        { title: "🪴 陽台清潔", items: ["徹底吸地板", "擦檯面", "換紙箱", "洗地板"] },
        { title: "🍳 廚房深度清潔", items: ["爐台全部擦拭", "擦爐台前牆壁油汙", "擦抽油煙機油汙", "流理槽油黴+籃子清洗+水龍頭", "餐桌雜物+桌面油汙擦乾淨"] }
    ];

    window.onload = function() {
        initDatePicker();
        renderTasks();
    };

    function initDatePicker() {
        const sel = document.getElementById('weekSelect');
        let d = new Date(2026, 3, 18); 
        for(let i=0; i<20; i++) {
            let next = new Date(d); next.setDate(d.getDate() + 1);
            let dateStr = d.toISOString().split('T')[0];
            let opt = new Option(`${d.toLocaleDateString()} - ${next.toLocaleDateString()}`, dateStr);
            sel.add(opt);
            d.setDate(d.getDate() + 7);
        }
        sel.onchange = renderTasks;
    }

    function getStorage() {
        const data = localStorage.getItem(STORAGE_KEY);
        return data ? JSON.parse(data) : {};
    }

    function renderTasks() {
        const week = document.getElementById('weekSelect').value;
        const allData = getStorage();
        const weekData = allData[week] || {};
        const container = document.getElementById('taskList');
        container.innerHTML = '';

        CHORE_GROUPS.forEach((group, gIdx) => {
            let tableHtml = `<h2>${group.title}</h2><table class="task-table">
                <thead><tr><th>完成</th><th>項目</th><th style="width:100px">完成者</th><th style="width:100px">複核</th></tr></thead>
                <tbody>`;

            group.items.forEach((name, iIdx) => {
                const key = `g${gIdx}-i${iIdx}`;
                const instances = weekData[key] || [{ done: false, doer: "", chk: "", customName: "" }];

                instances.forEach((data, sIdx) => {
                    const rowId = `${key}-s${sIdx}`;
                    const isCustom = name.includes("自訂項目");
                    const displayName = isCustom ? 
                        `<input type="text" class="custom-input" placeholder="${name}" id="name-${rowId}" value="${data.customName || ''}" onchange="autoSave()">` : 
                        name;

                    tableHtml += `
                    <tr id="tr-${rowId}" class="${data.done ? 'completed' : ''}">
                        <td style="width:40px"><input type="checkbox" id="ck-${rowId}" ${data.done ? 'checked' : ''} onchange="autoSave()"></td>
                        <td class="task-text">
                            ${displayName}${instances.length > 1 ? ` (${sIdx+1})` : ''}
                            ${sIdx === 0 ? `<button class="btn-add" onclick="addNewInstance('${key}')">+ 加次</button>` : `<span class="btn-del" onclick="removeInstance('${key}', ${sIdx})">✕</span>`}
                        </td>
                        <td><select id="doer-${rowId}" onchange="autoSave()">${MEMBERS.map(m => `<option value="${m}" ${data.doer===m?'selected':''}>${m}</option>`).join('')}</select></td>
                        <td><select id="chk-${rowId}" onchange="autoSave()">${CHECKERS.map(c => `<option value="${c}" ${data.chk===c?'selected':''}>${c}</option>`).join('')}</select></td>
                    </tr>`;
                });
            });
            tableHtml += `</tbody></table>`;
            container.innerHTML += tableHtml;
        });
        updateScores();
    }

    function autoSave() {
        const week = document.getElementById('weekSelect').value;
        const allData = getStorage();
        const weekData = {};

        document.querySelectorAll('tr[id^="tr-"]').forEach(tr => {
            const rowId = tr.id.replace('tr-', '');
            const [gInfo, sInfo] = rowId.split('-s');
            const sIdx = parseInt(sInfo);

            const ck = document.getElementById(`ck-${rowId}`);
            const de = document.getElementById(`doer-${rowId}`);
            const ch = document.getElementById(`chk-${rowId}`);
            const na = document.getElementById(`name-${rowId}`);

            if(!weekData[gInfo]) weekData[gInfo] = [];
            weekData[gInfo][sIdx] = { 
                done: ck.checked, 
                doer: de.value, 
                chk: ch.value, 
                customName: na ? na.value : "" 
            };
            if(ck.checked) tr.classList.add('completed'); else tr.classList.remove('completed');
        });

        allData[week] = weekData;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(allData));
        updateScores();
    }

    function addNewInstance(key) {
        autoSave();
        const week = document.getElementById('weekSelect').value;
        const allData = getStorage();
        if(!allData[week][key]) allData[week][key] = [];
        allData[week][key].push({ done: false, doer: "", chk: "", customName: "" });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(allData));
        renderTasks();
    }

    function removeInstance(key, idx) {
        autoSave();
        const week = document.getElementById('weekSelect').value;
        const allData = getStorage();
        allData[week][key].splice(idx, 1);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(allData));
        renderTasks();
    }

    function updateScores() {
        const scores = { "爸爸": 0, "媽媽": 0, "云": 0, "元": 0 };
        document.querySelectorAll('tr[id^="tr-"]').forEach(tr => {
            const rowId = tr.id.replace('tr-', '');
            const ck = document.getElementById(`ck-${rowId}`);
            const de = document.getElementById(`doer-${rowId}`);
            const ch = document.getElementById(`chk-${rowId}`);
            if(ck && ck.checked && ch.value !== "" && scores.hasOwnProperty(de.value)) {
                scores[de.value]++;
            }
        });
        for (let name in scores) {
            const el = document.getElementById(`score-${name}`);
            if(el) el.innerText = scores[name];
        }
    }

    function resetAll() {
        if(confirm('確定要清空本週所有進度嗎？')) {
            const week = document.getElementById('weekSelect').value;
            const allData = getStorage();
            delete allData[week];
            localStorage.setItem(STORAGE_KEY, JSON.stringify(allData));
            renderTasks();
        }
    }
</script>
</body>
</html>
